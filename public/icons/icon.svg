<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BDE0FE"/>
      <stop offset="0.55" stop-color="#A2D2FF"/>
      <stop offset="1" stop-color="#CDB4DB"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2B4C7E" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- full-bleed background (safe for circular maskable crop) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- sparkles -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M250 250 c14 36 26 48 62 62 c-36 14 -48 26 -62 62 c-14 -36 -26 -48 -62 -62 c36 -14 48 -26 62 -62 z"/>
    <path d="M790 300 c10 26 18 34 44 44 c-26 10 -34 18 -44 44 c-10 -26 -18 -34 -44 -44 c26 -10 34 -18 44 -44 z"/>
    <path d="M800 740 c9 22 16 30 38 38 c-22 9 -30 16 -38 38 c-9 -22 -16 -30 -38 -38 c22 -9 30 -16 38 -38 z"/>
  </g>

  <!-- centered heart (kept within the maskable safe zone) -->
  <path filter="url(#soft)" fill="#FFFFFF"
    d="M512 720
       C512 720 300 596 300 452
       C300 380 356 330 420 330
       C466 330 498 358 512 392
       C526 358 558 330 604 330
       C668 330 724 380 724 452
       C724 596 512 720 512 720 Z"/>
  <!-- little cheeks for cuteness -->
  <g fill="#FFC8DD" opacity="0.95">
    <circle cx="452" cy="500" r="20"/>
    <circle cx="572" cy="500" r="20"/>
  </g>
</svg>
